[agent]
  # 데이터가 5000개가 쌓이면 DB에 넣기
  metric_batch_size = 5000
  metric_buffer_limit = 100000

  interval = "1s"
  round_interval = true

  # 데이터가 5000개가 쌓이기 전이라도 5초에 한번씩 DB에 넣는다
  flush_interval = "5s"

  # hostname이 tag로 들어오지 않도록 설정
  omit_hostname = true
  debug = false

# --- [3. MQTT Consumer] ---
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  # 토픽 구조에 맞춰 와일드카드 설정
  topics = ["C-S/#"]
  # topics = ["C-S/3110/BT/OSP/+/+/+/+"]
  data_format = "json"
  # Keep payload timestamp as a field so mapping_processor.py can write it to capture_dt.
  # Telegraf will use collection time for the PostgreSQL measurement.time column.

  [[inputs.mqtt_consumer.topic_parsing]]
    # 기존: S-C/+/+/+/+/+/+/+ (8개 세그먼트)
    # 5번째: line_code, 6번째: equip_name으로 지정
    # 7번째는 테이블에서 삭제되었으므로 태그 이름을 'station' 등으로 유지하거나 버릴 수 있습니다.
    # 여기서는 파이썬 스크립트의 tags.get("station") 로직과의 호환성을 위해 유지합니다.
    topic = "C-S/+/+/+/+/+/+/+"
    tags = "_/_/_/_/line_code/equip_name/station/_"

[[processors.execd]]
  namepass = ["mqtt_consumer"]
  command = ["python3", "-u", "/telegraf/telegraf_py/mapping_processor.py"]
  restart_delay = "10s"

# --- [4. PostgreSQL Output] ---
[[outputs.postgresql]]
  connection = "postgres://admin:1q2w3e4r@hmi-db-postgres:5432/edge_hmi?sslmode=disable"
  schema = "core"
  name_override = "measurement"
  tagexclude = ["host", "line_code", "equip_code", "equip_name", "station", "topic"]

  # ⭐ 초고속 COPY 방식을 명시합니다. (기본값이므로 생략해도 copy로 동작합니다)
  method = "copy"

  # ⭐ COPY 중 발생하는 중복 충돌을 방지하기 위한 필수 안전장치
  table_upsert_conflict_target = ["time", "equip_id", "sensor_id"]
  action = "upsert"






